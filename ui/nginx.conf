server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://*; base-uri 'self'; form-action 'self'" always;

    # Same-origin API gateway. The trailing slash removes the external /api
    # prefix before forwarding the request to the NestJS service.
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $http_x_request_id;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # SPA fallback — redirect all non-file routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache index.html aggressively (ensures fresh SPA loads)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # Cache versioned JS/CSS assets (Vite generates content hashes)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
